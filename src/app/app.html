<a class="skip-link" href="#main-content">Skip to content</a>

<div class="app-shell">
  <header class="site-header">
    <div class="brand">
      <img
        class="brand-mark"
        ngSrc="images/logo.jpeg"
        width="48"
        height="48"
        alt="Spray Away Power Washing logo"
        priority
      />
      <div class="brand-copy">
        <span class="brand-name">Spray Away</span>
        <span class="brand-tag">Power Washing</span>
      </div>
    </div>
    <nav class="site-nav" aria-label="Primary">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Landing</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    </nav>
    <a class="btn ghost" routerLink="/contact">Book a visit</a>
  </header>

  <main id="main-content" class="site-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="site-footer">
    <div>
      <p class="footer-title">Spray Away Power Washing</p>
      <p class="footer-copy">Outdoor surfaces cleaned with care. Fully insured and locally owned.</p>
    </div>
    <div class="footer-meta">
      <span>Open Mon-Sat</span>
      <span>Call 585-313-4162</span>
      <span>Developer: Jayson Guevarra (jzon_03@yahoo.com)</span>
    </div>
  </footer>
</div>
